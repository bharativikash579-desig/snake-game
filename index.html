<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 SNAKE GAME - Start Button Edition</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #0f1f0f;
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), inset 0 1px 4px rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            background-color: #1e2a1a;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 8px;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-box {
            background: #010b01;
            padding: 8px 24px;
            border-radius: 60px;
            color: #b7ff9e;
            font-weight: bold;
            font-size: 1.7rem;
            letter-spacing: 2px;
            font-family: monospace;
            text-shadow: 0 0 5px #6f9e4f;
            box-shadow: inset 0 2px 5px #00000033, 0 5px 10px rgba(0,0,0,0.2);
        }

        .score-box span {
            font-size: 0.9rem;
            color: #c0e0a8;
            margin-right: 8px;
        }

        .restart-btn, .start-btn {
            background: #2c3e2b;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 6px 22px;
            border-radius: 40px;
            color: #f1f9e6;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 5px 0 #0f1a0e;
            letter-spacing: 1px;
        }

        .start-btn {
            background: #27ae60;
            box-shadow: 0 5px 0 #1e8449;
            font-size: 1.3rem;
            padding: 8px 32px;
        }

        .start-btn:hover {
            background: #2ecc71;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #1e8449;
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1e8449;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f1a0e;
        }

        .status {
            background: #141f12;
            padding: 6px 18px;
            border-radius: 32px;
            color: #e2ffc7;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            min-width: 130px;
            box-shadow: inset 0 1px 3px #2b4623, 0 3px 6px rgba(0,0,0,0.3);
        }

        .touch-controller {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 8px;
        }

        .controller-row {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: #1e2a1c;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #e2ffc7;
            cursor: pointer;
            box-shadow: 0 6px 0 #0a1309;
            transition: 0.05s linear;
            touch-action: manipulation;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d3d2a;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0a1309;
        }

        .ctrl-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 550px) {
            .ctrl-btn {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }
            .game-container {
                padding: 12px 16px 18px 16px;
            }
            .score-box {
                font-size: 1.3rem;
                padding: 4px 18px;
            }
            .start-btn {
                font-size: 1.1rem;
                padding: 6px 24px;
            }
        }

        .controls-tip {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 18px;
            font-size: 0.8rem;
            color: #b4d7a2;
            background: #0f1a0c80;
            backdrop-filter: blur(2px);
            padding: 6px 12px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            flex-wrap: wrap;
        }

        .controls-tip kbd {
            background: #2c2c1c;
            border-radius: 8px;
            padding: 4px 8px;
            font-weight: bold;
            color: #f7ffcf;
            font-family: monospace;
            margin: 0 4px;
            box-shadow: inset 0 1px 0 #6b6b4b, 0 1px 1px black;
        }

        .button-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="snakeCanvas" width="500" height="500"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>🍎 SCORE</span> <span id="scoreValue">0</span></div>
            <div class="status" id="gameStatusText">⏸ PRESS START</div>
            <div class="button-group">
                <button class="start-btn" id="startButton">▶ START GAME</button>
                <button class="restart-btn" id="restartButton">🔄 RESTART</button>
            </div>
        </div>
        
        <div class="touch-controller">
            <div class="controller-row">
                <button class="ctrl-btn" data-dir="up" disabled>▲</button>
            </div>
            <div class="controller-row">
                <button class="ctrl-btn" data-dir="left" disabled>◀</button>
                <button class="ctrl-btn" data-dir="down" disabled>▼</button>
                <button class="ctrl-btn" data-dir="right" disabled>▶</button>
            </div>
        </div>
        
        <div class="controls-tip">
            <span>⌨️ <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd></span>
            <span>🎮 Click <kbd>START</kbd> to begin</span>
            <span>🖱️ <kbd>R</kbd> restart</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- GAME CONFIGURATION ----------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameStatusSpan = document.getElementById('gameStatusText');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        
        const DIR = {
            UP:    { x: 0, y: -1 },
            DOWN:  { x: 0, y: 1 },
            LEFT:  { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };
        
        const GAME_SPEED_MS = 170;
        
        let snake = [];
        let food = { x: 12, y: 10 };
        let currentDirection = DIR.RIGHT;
        let nextDirection = DIR.RIGHT;
        let score = 0;
        let gameLoopId = null;
        let gameActive = false;  // FALSE until Start button clicked
        let gameStarted = false;  // Track if game has ever started
        
        // ========== GUARANTEED APPLE GENERATION ==========
        function findEmptyCell() {
            const occupied = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
            
            for (let segment of snake) {
                occupied[segment.x][segment.y] = true;
            }
            
            const emptyCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!occupied[i][j]) {
                        emptyCells.push({ x: i, y: j });
                    }
                }
            }
            
            if (emptyCells.length === 0) {
                return null;
            }
            
            const randomIndex = Math.floor(Math.random() * emptyCells.length);
            return emptyCells[randomIndex];
        }
        
        function generateNewFood() {
            const newFoodPosition = findEmptyCell();
            if (newFoodPosition === null) {
                return null;
            }
            return newFoodPosition;
        }
        
        function updateScoreUI() {
            scoreSpan.textContent = score;
        }
        
        function isCollisionWithBody(pos, ignoreHead = false) {
            const startIdx = ignoreHead ? 1 : 0;
            for (let i = startIdx; i < snake.length; i++) {
                if (snake[i].x === pos.x && snake[i].y === pos.y) {
                    return true;
                }
            }
            return false;
        }
        
        function isOutOfBounds(pos) {
            return pos.x < 0 || pos.x >= GRID_SIZE || pos.y < 0 || pos.y >= GRID_SIZE;
        }
        
        function gameTick() {
            if (!gameActive) return;
            
            const newDir = nextDirection;
            const isOpposite = (currentDirection.x === -newDir.x && currentDirection.y === -newDir.y);
            if (!isOpposite) {
                currentDirection = newDir;
            }
            
            const head = snake[0];
            const newHead = {
                x: head.x + currentDirection.x,
                y: head.y + currentDirection.y
            };
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            if (willEat) {
                snake = [newHead, ...snake];
                score++;
                updateScoreUI();
                
                const newFood = generateNewFood();
                if (newFood === null) {
                    gameActive = false;
                    if (gameLoopId) {
                        clearInterval(gameLoopId);
                        gameLoopId = null;
                    }
                    gameStatusSpan.textContent = "🏆 YOU WIN! 🏆";
                    gameStatusSpan.style.color = "#f9f0b5";
                    enableStartButton(true);
                    drawGame();
                    return;
                } else {
                    food = newFood;
                }
            } else {
                snake = [newHead, ...snake.slice(0, -1)];
            }
            
            const headPos = snake[0];
            if (isOutOfBounds(headPos)) {
                gameOver();
                return;
            }
            
            if (isCollisionWithBody(headPos, true)) {
                gameOver();
                return;
            }
            
            drawGame();
        }
        
        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
            gameStatusSpan.textContent = "💀 GAME OVER 💀";
            gameStatusSpan.style.color = "#ffbc9e";
            enableStartButton(true);
            drawGame();
        }
        
        function setDirection(newDir) {
            if (!gameActive) return;
            const isOpposite = (currentDirection.x === -newDir.x && currentDirection.y === -newDir.y);
            if (!isOpposite) {
                nextDirection = newDir;
            }
        }
        
        // Enable/disable control buttons
        function enableStartButton(enable) {
            const ctrlBtns = document.querySelectorAll('.ctrl-btn');
            ctrlBtns.forEach(btn => {
                if (enable) {
                    btn.disabled = false;
                    btn.classList.remove('disabled');
                } else {
                    btn.disabled = true;
                    btn.classList.add('disabled');
                }
            });
        }
        
        // Initialize game state (doesn't start the loop)
        function initGameState() {
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            
            currentDirection = DIR.RIGHT;
            nextDirection = DIR.RIGHT;
            score = 0;
            updateScoreUI();
            
            const initialFood = generateNewFood();
            if (initialFood) {
                food = initialFood;
            } else {
                food = { x: 15, y: 15 };
            }
            
            drawGame();
        }
        
        // START GAME function
        function startGame() {
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
            
            // Reset everything
            initGameState();
            gameActive = true;
            gameStarted = true;
            gameStatusSpan.textContent = "🐍 PLAYING";
            gameStatusSpan.style.color = "#e2ffc7";
            
            // Enable controls
            enableStartButton(false);
            
            // Start the game loop
            gameLoopId = setInterval(gameTick, GAME_SPEED_MS);
            drawGame();
        }
        
        // RESTART GAME (resets and waits for Start)
        function restartGame() {
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
            
            gameActive = false;
            gameStarted = false;
            
            // Reset snake
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            
            currentDirection = DIR.RIGHT;
            nextDirection = DIR.RIGHT;
            score = 0;
            updateScoreUI();
            
            const initialFood = generateNewFood();
            if (initialFood) {
                food = initialFood;
            } else {
                food = { x: 15, y: 15 };
            }
            
            gameStatusSpan.textContent = "⏸ PRESS START";
            gameStatusSpan.style.color = "#e2ffc7";
            
            // Disable controls until start
            enableStartButton(true);
            
            drawGame();
        }
        
        // ---------- RENDERING ----------
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid lines
            ctx.strokeStyle = "#2f4d2d";
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // Draw food
            if (food) {
                const fx = food.x * CELL_SIZE;
                const fy = food.y * CELL_SIZE;
                
                const grad = ctx.createRadialGradient(fx + 8, fy + 8, 3, fx + 12, fy + 12, 14);
                grad.addColorStop(0, "#ff4757");
                grad.addColorStop(1, "#c0392b");
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE * 0.42, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = "#ff6b81";
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE * 0.35, fy + CELL_SIZE * 0.35, 3, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = "#2ecc71";
                ctx.beginPath();
                ctx.moveTo(fx + CELL_SIZE * 0.8, fy + CELL_SIZE * 0.2);
                ctx.lineTo(fx + CELL_SIZE * 0.95, fy + CELL_SIZE * 0.05);
                ctx.lineTo(fx + CELL_SIZE * 0.7, fy + CELL_SIZE * 0.1);
                ctx.fill();
            }
            
            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const sx = seg.x * CELL_SIZE;
                const sy = seg.y * CELL_SIZE;
                
                if (i === 0) {
                    ctx.fillStyle = "#6fbf4c";
                    ctx.shadowBlur = 3;
                    ctx.shadowColor = "#274e13";
                    ctx.beginPath();
                    ctx.roundRect(sx + 2, sy + 2, CELL_SIZE - 4, CELL_SIZE - 4, 8);
                    ctx.fill();
                    
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE - 8, sy + 8, 3.5, 0, Math.PI*2);
                    ctx.arc(sx + 8, sy + 8, 3.5, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = "#1a1a1a";
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE - 7, sy + 7, 2, 0, Math.PI*2);
                    ctx.arc(sx + 9, sy + 7, 2, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    const gradient = ctx.createLinearGradient(sx, sy, sx + CELL_SIZE, sy + CELL_SIZE);
                    gradient.addColorStop(0, "#5cb85c");
                    gradient.addColorStop(1, "#3c8c3c");
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 1;
                    ctx.beginPath();
                    ctx.roundRect(sx + 2, sy + 2, CELL_SIZE - 4, CELL_SIZE - 4, 6);
                    ctx.fill();
                    
                    ctx.fillStyle = "#2d6a2d";
                    ctx.beginPath();
                    ctx.arc(sx + CELL_SIZE * 0.7, sy + CELL_SIZE * 0.5, 2.5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
            
            // Draw overlay if game not active
            if (!gameActive && !gameStarted) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${Math.floor(CELL_SIZE * 1.4)}px 'Courier New', monospace`;
                ctx.fillStyle = "#fdd68b";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("🐍 SNAKE GAME", canvas.width/2, canvas.height/2 - 30);
                ctx.font = `18px monospace`;
                ctx.fillStyle = "#caf5a5";
                ctx.fillText("Click START GAME to begin", canvas.width/2, canvas.height/2 + 10);
                ctx.font = `14px monospace`;
                ctx.fillStyle = "#8bc34a";
                ctx.fillText("Use arrow keys or touch buttons", canvas.width/2, canvas.height/2 + 50);
                ctx.textAlign = "left";
            } else if (!gameActive && gameStarted && gameStatusSpan.textContent.includes("GAME OVER")) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${Math.floor(CELL_SIZE * 1.6)}px 'Courier New', monospace`;
                ctx.fillStyle = "#fdd68b";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("💀 GAME OVER 💀", canvas.width/2, canvas.height/2 - 15);
                ctx.font = `16px monospace`;
                ctx.fillStyle = "#caf5a5";
                ctx.fillText("Click START to play again", canvas.width/2, canvas.height/2 + 30);
                ctx.textAlign = "left";
            } else if (!gameActive && gameStarted && gameStatusSpan.textContent.includes("WIN")) {
                ctx.fillStyle = "rgba(46, 204, 113, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${Math.floor(CELL_SIZE * 1.6)}px 'Courier New', monospace`;
                ctx.fillStyle = "#fff7cf";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("✨ VICTORY! ✨", canvas.width/2, canvas.height/2 - 15);
                ctx.font = `16px monospace`;
                ctx.fillStyle = "#f9f0b5";
                ctx.fillText(`Final Score: ${score}`, canvas.width/2, canvas.height/2 + 30);
                ctx.textAlign = "left";
            }
        }
        
        // Round rect helper
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ---------- EVENT HANDLERS ----------
        function handleKeyDown(e) {
            const key = e.key;
            if (key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight" || key === "r" || key === "R") {
                e.preventDefault();
            }
            
            // R key restarts (resets to start screen)
            if (key === "r" || key === "R") {
                restartGame();
                return;
            }
            
            // Only allow movement if game is active
            if (!gameActive) return;
            
            switch(key) {
                case "ArrowUp": setDirection(DIR.UP); break;
                case "ArrowDown": setDirection(DIR.DOWN); break;
                case "ArrowLeft": setDirection(DIR.LEFT); break;
                case "ArrowRight": setDirection(DIR.RIGHT); break;
                default: break;
            }
        }
        
        function setupTouchControls() {
            const upBtn = document.querySelector('[data-dir="up"]');
            const downBtn = document.querySelector('[data-dir="down"]');
            const leftBtn = document.querySelector('[data-dir="left"]');
            const rightBtn = document.querySelector('[data-dir="right"]');
            
            if (upBtn) upBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setDirection(DIR.UP);
            });
            if (downBtn) downBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setDirection(DIR.DOWN);
            });
            if (leftBtn) leftBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setDirection(DIR.LEFT);
            });
            if (rightBtn) rightBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setDirection(DIR.RIGHT);
            });
            
            const allBtns = document.querySelectorAll('.ctrl-btn');
            allBtns.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (!btn.disabled) {
                        btn.click();
                    }
                });
            });
        }
        
        // Swipe support
        let touchStartPos = null;
        function handleCanvasTouchStart(e) {
            e.preventDefault();
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStartPos = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }
        
        function handleCanvasTouchMove(e) {
            e.preventDefault();
            if (!touchStartPos || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const currentX = touch.clientX - rect.left;
            const currentY = touch.clientY - rect.top;
            const dx = currentX - touchStartPos.x;
            const dy = currentY - touchStartPos.y;
            if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) setDirection(DIR.RIGHT);
                else setDirection(DIR.LEFT);
            } else {
                if (dy > 0) setDirection(DIR.DOWN);
                else setDirection(DIR.UP);
            }
            touchStartPos = null;
        }
        
        function handleCanvasTouchEnd(e) {
            e.preventDefault();
            touchStartPos = null;
        }
        
        // ---------- INITIALIZE ----------
        function init() {
            initGameState();
            gameActive = false;
            gameStarted = false;
            enableStartButton(true);
            
            startButton.addEventListener('click', () => startGame());
            restartButton.addEventListener('click', () => restartGame());
            
            window.addEventListener('keydown', handleKeyDown);
            
            canvas.addEventListener('touchstart', handleCanvasTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleCanvasTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleCanvasTouchEnd);
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            
            setupTouchControls();
        }
        
        init();
    })();
</script>
